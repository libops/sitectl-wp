name: release-config

on:
  pull_request:
    paths:
      - ".goreleaser.yaml"
      - ".github/workflows/goreleaser.yaml"
      - ".github/workflows/release-config.yaml"

permissions:
  contents: read

concurrency:
  group: release-config-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true

      - name: Validate release configuration
        shell: bash
        env:
          GORELEASER_DISABLE_SCM_RELEASE: "false"
        run: |
          set -euo pipefail

          set +e
          output="$(goreleaser check 2>&1)"
          status=$?
          set -e

          printf '%s\n' "$output"

          if [[ "$status" -eq 0 ]]; then
            exit 0
          fi

          if [[ "$status" -ne 2 ]]; then
            exit "$status"
          fi

          plain_output="$(printf '%s\n' "$output" | sed $'s/\033\\[[0-9;]*m//g')"
          if ! grep -Fq "configuration is valid, but uses deprecated properties" <<<"$plain_output"; then
            echo "GoReleaser did not report a valid deprecated configuration" >&2
            exit 1
          fi

          mapfile -t deprecations < <(grep -F "DEPRECATED:" <<<"$plain_output" || true)
          if [[ "${#deprecations[@]}" -ne 1 ]] || [[ "${deprecations[0]}" != *brews* ]]; then
            echo "Only the reviewed brews deprecation is allowed" >&2
            exit 1
          fi

      - name: Verify recovery-safe Homebrew source URL
        shell: bash
        env:
          EXPECTED_BREW_URL: '    url_template: "https://github.com/${{ github.repository }}/releases/download/{{ .Tag }}/{{ .ArtifactName }}"'
        run: |
          set -euo pipefail

          matches="$(grep -Fxc "$EXPECTED_BREW_URL" .goreleaser.yaml || true)"
          if [[ "$matches" -ne 1 ]]; then
            echo "Expected exactly one recovery-safe Homebrew url_template" >&2
            exit 1
          fi

      - name: Verify direct Homebrew publication
        shell: bash
        run: |
          set -euo pipefail

          if grep -Eq '^[[:space:]]+(branch|pull_request):' .goreleaser.yaml; then
            echo "Homebrew publication must update the tap default branch directly" >&2
            exit 1
          fi

      - name: Verify trusted package publisher workflow
        shell: bash
        env:
          EXPECTED_WORKFLOW: "libops/.github/.github/workflows/sitectl-plugin-goreleaser.yaml@5f44a8c8d157bb7e5cf6d9e1c98847a604e87455"
        run: |
          set -euo pipefail

          matches="$(grep -Fc "uses: ${EXPECTED_WORKFLOW} # main" .github/workflows/goreleaser.yaml || true)"
          if [[ "$matches" -ne 1 ]]; then
            echo "Release publication must use the reviewed shared workflow commit" >&2
            exit 1
          fi
