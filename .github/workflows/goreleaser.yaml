name: goreleaser

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    uses: libops/.github/.github/workflows/sitectl-plugin-goreleaser.yaml@main
    permissions:
      contents: write
      id-token: write
    secrets: inherit
    with:
      go-version: ">=1.26.1"
      package-name: sitectl-wp
