name: goreleaser

on:
  workflow_dispatch:
    inputs:
      release-mode:
        description: Recovery mode; full is only valid from a new tag ref
        required: true
        type: choice
        default: packages-only
        options:
          - packages-only
          - homebrew-only
          - full
      release-version:
        description: Existing vMAJOR.MINOR.PATCH tag for a recovery mode
        required: false
        type: string
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write

jobs:
  lint-test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.release-version || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          install-only: true

      - name: lint
        run: make lint

      - name: unit test
        run: make test

  goreleaser:
    needs: lint-test
    uses: libops/.github/.github/workflows/sitectl-plugin-goreleaser.yaml@66905c983e1ec673e936a7dc4b4d5c2ad0016b49 # main
    permissions:
      contents: write
      id-token: write
    secrets: inherit
    with:
      go-version: "1.26.5"
      release-mode: ${{ inputs.release-mode || 'full' }}
      release-version: ${{ inputs.release-version }}
      package-name: sitectl-wp
