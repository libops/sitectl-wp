name: goreleaser

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write

jobs:
  lint-test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ">=1.26.1"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: latest
          install-only: true

      - name: lint
        run: make lint

      - name: unit test
        run: make test

  goreleaser:
    needs: lint-test
    uses: libops/.github/.github/workflows/sitectl-plugin-goreleaser.yaml@main
    permissions:
      contents: write
      id-token: write
    secrets: inherit
    with:
      go-version: ">=1.26.1"
      package-name: sitectl-wp
