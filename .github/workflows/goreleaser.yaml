name: goreleaser

on:
  workflow_dispatch:
    inputs:
      release-mode:
        description: Release mode; full supports tag publication or default-branch recovery
        required: true
        type: choice
        default: packages-only
        options:
          - packages-only
          - full
      release-version:
        description: Existing vMAJOR.MINOR.PATCH tag for default-branch recovery
        required: false
        type: string
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write

jobs:
  lint-test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.release-version || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          install-only: true

      - name: lint
        run: make lint

      - name: unit test
        run: make test

  goreleaser:
    needs: lint-test
    uses: libops/.github/.github/workflows/sitectl-plugin-goreleaser.yaml@5f44a8c8d157bb7e5cf6d9e1c98847a604e87455 # main
    permissions:
      contents: write
      id-token: write
    secrets:
      HOMEBREW_REPO: ${{ secrets.HOMEBREW_REPO }}
    with:
      go-version: "1.26.5"
      release-mode: ${{ github.ref_type == 'tag' && 'full' || inputs.release-mode }}
      release-version: ${{ inputs.release-version }}
      package-name: sitectl-wp
      sitectl-ref: 65cfde137a58ba14aaa9a1512d88b943888872f3 # v1.0.0
