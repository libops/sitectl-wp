version: 2
release:
  disable: "{{ .Env.GORELEASER_DISABLE_SCM_RELEASE }}"
before:
  hooks:
    - ./scripts/check-sitectl-core-version.sh v0.40.0
    - go mod tidy
builds:
  - binary: sitectl-wp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - linux
      - windows
      - darwin

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^.github"
brews:
  - name: sitectl-wp
    description: "A sitectl plugin for WordPress stacks"
    homepage: "https://github.com/libops/sitectl-wp"
    license: MIT
    commit_author:
      name: sitectl-dev[bot]
      email: 2408410+sitectl-dev[bot]@users.noreply.github.com
    repository:
      owner: libops
      name: homebrew
      branch: "{{ .ProjectName }}-{{ .Version }}"
      token: "{{ .Env.HOMEBREW_REPO_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: libops
          name: homebrew
          branch: main
    dependencies:
      - name: "libops/homebrew/sitectl"
nfpms:
  - id: sitectl-wp
    package_name: sitectl-wp
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: libops
    homepage: "https://github.com/libops/sitectl-wp"
    description: "A sitectl plugin for WordPress stacks"
    maintainer: "Joe Corall <joe@libops.io>"
    license: "MIT"
    formats:
      - apk
      - deb
      - rpm
    mtime: "{{ .CommitDate }}"
    ids:
      - sitectl-wp
    dependencies:
      - sitectl
    overrides:
      deb:
        dependencies:
          - sitectl (>= 0.40.0)
      rpm:
        dependencies:
          - sitectl >= 0.40.0
      apk:
        dependencies:
          - sitectl>=0.40.0
